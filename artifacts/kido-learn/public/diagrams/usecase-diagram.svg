  <text x="60" y="266" text-anchor="middle" font-size="11" fill="#333">Child User</text>

  <!-- ── ACTOR: System/Server (right) ── -->
  <circle cx="840" cy="280" r="18" fill="none" stroke="#333" stroke-width="1.8"/>
