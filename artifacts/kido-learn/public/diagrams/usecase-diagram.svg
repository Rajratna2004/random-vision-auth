  <line x1="400" y1="335" x2="460" y2="275" stroke="#444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="435" y="300" text-anchor="middle" font-size="9" fill="#666">«include»</text>

  <line x1="400" y1="395" x2="460" y2="335" stroke="#444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="435" y="358" text-anchor="middle" font-size="9" fill="#666">«include»</text>

  <line x1="400" y1="455" x2="460" y2="395" stroke="#444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="435" y="418" text-anchor="middle" font-size="9" fill="#666">«include»</text>

  <line x1="400" y1="455" x2="460" y2="455" stroke="#444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="430" y="448" text-anchor="middle" font-size="9" fill="#666">«extend»</text>

  <!-- System → right-column use cases -->
  <line x1="810" y1="290" x2="680" y2="220" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="810" y1="295" x2="680" y2="280" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="810" y1="300" x2="680" y2="340" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="810" y1="305" x2="680" y2="400" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="810" y1="310" x2="680" y2="460" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

</svg>
