<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" font-family="Arial, sans-serif" font-size="11">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#333"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="white"/>

  <!-- ══ USER (circle) ══ -->
  <circle cx="80" cy="280" r="30" fill="white" stroke="#333" stroke-width="1.8"/>
  <text x="80" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">User</text>

  <!-- ══════════════════════════════════
       PROCESS BOXES (rounded rectangles)
  ══════════════════════════════════ -->

  <!-- 1.0 Authentication -->
  <rect x="240" y="58" width="185" height="46" rx="5" fill="white" stroke="#333" stroke-width="1.8"/>
  <text x="332" y="77" text-anchor="middle" font-weight="bold" fill="#333">1.0 Authentication</text>
  <text x="332" y="93" text-anchor="middle" fill="#555">Login · Register · Face · JWT</text>

  <!-- 2.0 Lesson Engine -->
  <rect x="240" y="188" width="185" height="46" rx="5" fill="white" stroke="#333" stroke-width="1.8"/>
  <text x="332" y="207" text-anchor="middle" font-weight="bold" fill="#333">2.0 Lesson Engine</text>
  <text x="332" y="223" text-anchor="middle" fill="#555">60 Lessons · 6 Courses</text>

  <!-- 3.0 Quiz Engine -->
  <rect x="240" y="318" width="185" height="46" rx="5" fill="white" stroke="#333" stroke-width="1.8"/>
  <text x="332" y="337" text-anchor="middle" font-weight="bold" fill="#333">3.0 Quiz Engine</text>
  <text x="332" y="353" text-anchor="middle" fill="#555">AI Generator · Evaluator</text>

  <!-- 4.0 Gesture Game Engine -->
  <rect x="240" y="448" width="185" height="46" rx="5" fill="white" stroke="#333" stroke-width="1.8"/>
  <text x="332" y="467" text-anchor="middle" font-weight="bold" fill="#333">4.0 Gesture Game Engine</text>
  <text x="332" y="483" text-anchor="middle" fill="#555">Air Draw · Piano · Painter</text>

  <!-- ══════════════════════════════════
       DATA STORES (open-ended rectangles)
  ══════════════════════════════════ -->

  <!-- D1 Users -->
  <line x1="580" y1="60" x2="580" y2="104" stroke="#333" stroke-width="1.8"/>
  <line x1="580" y1="60" x2="730" y2="60" stroke="#333" stroke-width="1.8"/>
  <line x1="730" y1="60" x2="730" y2="104" stroke="#333" stroke-width="1.8"/>
  <line x1="580" y1="104" x2="730" y2="104" stroke="#333" stroke-width="1.8"/>
  <line x1="600" y1="60" x2="600" y2="104" stroke="#333" stroke-width="1.8"/>
  <text x="596" y="87" text-anchor="middle" font-weight="bold" fill="#333">D1</text>
  <text x="666" y="78" text-anchor="middle" font-weight="bold" fill="#333">Users</text>
  <text x="666" y="94" text-anchor="middle" fill="#555">Profiles · Sessions</text>

  <!-- D2 Courses/Lessons -->
  <line x1="580" y1="190" x2="580" y2="234" stroke="#333" stroke-width="1.8"/>
  <line x1="580" y1="190" x2="730" y2="190" stroke="#333" stroke-width="1.8"/>
  <line x1="730" y1="190" x2="730" y2="234" stroke="#333" stroke-width="1.8"/>
  <line x1="580" y1="234" x2="730" y2="234" stroke="#333" stroke-width="1.8"/>
  <line x1="600" y1="190" x2="600" y2="234" stroke="#333" stroke-width="1.8"/>
  <text x="596" y="217" text-anchor="middle" font-weight="bold" fill="#333">D2</text>
  <text x="666" y="208" text-anchor="middle" font-weight="bold" fill="#333">Courses / Lessons</text>
  <text x="666" y="224" text-anchor="middle" fill="#555">Content · Order · Type</text>

  <!-- D3 Progress/Scores -->
  <line x1="580" y1="320" x2="580" y2="364" stroke="#333" stroke-width="1.8"/>
  <line x1="580" y1="320" x2="730" y2="320" stroke="#333" stroke-width="1.8"/>
  <line x1="730" y1="320" x2="730" y2="364" stroke="#333" stroke-width="1.8"/>
  <line x1="580" y1="364" x2="730" y2="364" stroke="#333" stroke-width="1.8"/>
  <line x1="600" y1="320" x2="600" y2="364" stroke="#333" stroke-width="1.8"/>
  <text x="596" y="347" text-anchor="middle" font-weight="bold" fill="#333">D3</text>
  <text x="666" y="338" text-anchor="middle" font-weight="bold" fill="#333">Progress / Scores</text>
  <text x="666" y="354" text-anchor="middle" fill="#555">Completion · Results</text>

  <!-- ══ MediaPipe CDN (external cloud) ══ -->
  <!-- Cloud -->
  <circle cx="652" cy="444" r="18" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="674" cy="436" r="15" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="696" cy="440" r="17" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="714" cy="450" r="13" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="700" cy="460" r="15" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="676" cy="462" r="17" fill="white" stroke="#333" stroke-width="1.5"/>
  <circle cx="654" cy="458" r="13" fill="white" stroke="#333" stroke-width="1.5"/>
  <rect x="650" y="444" width="68" height="20" fill="white"/>
  <text x="684" y="452" text-anchor="middle" font-weight="bold" fill="#333">MediaPipe</text>
  <text x="684" y="465" text-anchor="middle" fill="#555">CDN / WASM</text>

  <!-- ══════════════════════════════════
       ARROWS — User → Processes
  ══════════════════════════════════ -->

  <!-- User → 1.0 Authentication (Login/Register) -->
  <path d="M108,262 C160,220 200,140 240,105" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="152" y="178" text-anchor="middle" fill="#333">Login / Register</text>

  <!-- 1.0 Authentication → User (Auth Status) -->
  <path d="M240,118 C200,158 160,230 108,268" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="148" y="216" text-anchor="middle" fill="#333">Auth Status</text>

  <!-- User → 2.0 Lesson Engine (Select Lesson) -->
  <path d="M108,275 C170,252 200,228 240,218" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="178" y="248" text-anchor="middle" fill="#333">Select Course / Lesson</text>

  <!-- 2.0 Lesson Engine → User (Lesson Content) -->
  <path d="M240,228 C200,248 160,262 108,278" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="168" y="268" text-anchor="middle" fill="#333">Lesson Content</text>

  <!-- User → 3.0 Quiz Engine (Submit Answers) -->
  <path d="M108,288 C165,310 200,335 240,345" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="172" y="308" text-anchor="middle" fill="#333">Submit Quiz Answers</text>

  <!-- 3.0 Quiz Engine → User (Score/Result) -->
  <path d="M240,355 C200,368 160,340 108,298" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="152" y="358" text-anchor="middle" fill="#333">Score / Result</text>

  <!-- User → 4.0 Gesture Game Engine (Open Game) -->
  <path d="M108,295 C160,380 200,450 240,468" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="148" y="408" text-anchor="middle" fill="#333">Open Game</text>

  <!-- 4.0 Gesture Game Engine → User (Game Response) -->
  <path d="M240,478 C195,490 148,440 108,300" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="94" y="432" text-anchor="middle" fill="#333" transform="rotate(-90,94,432)">Game Response</text>

  <!-- ══════════════════════════════════
       ARROWS — Processes → Data Stores
  ══════════════════════════════════ -->

  <!-- 1.0 → D1 Users (User CRUD) -->
  <line x1="425" y1="82" x2="578" y2="82" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="500" y="76" text-anchor="middle" fill="#333">User CRUD</text>

  <!-- D1 → 1.0 (User Record) -->
  <line x1="578" y1="92" x2="425" y2="92" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="500" y="103" text-anchor="middle" fill="#555">User Record</text>

  <!-- 2.0 → D2 Courses (Query Lesson) -->
  <line x1="425" y1="208" x2="578" y2="208" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="500" y="202" text-anchor="middle" fill="#333">Query Lesson</text>

  <!-- D2 → 2.0 (Lesson Data) -->
  <line x1="578" y1="218" x2="425" y2="218" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="500" y="230" text-anchor="middle" fill="#555">Lesson Data</text>

  <!-- 3.0 → D3 Progress (Save Score) -->
  <line x1="425" y1="338" x2="578" y2="338" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="500" y="332" text-anchor="middle" fill="#333">Save Score / Progress</text>

  <!-- D3 → 3.0 (User History) -->
  <line x1="578" y1="350" x2="425" y2="350" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="500" y="362" text-anchor="middle" fill="#555">User History</text>

  <!-- 4.0 → MediaPipe (Model Request) -->
  <line x1="425" y1="468" x2="640" y2="456" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="528" y="456" text-anchor="middle" fill="#333">Model Request</text>

  <!-- MediaPipe → 4.0 (WASM Data) -->
  <line x1="640" y1="466" x2="425" y2="478" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="530" y="482" text-anchor="middle" fill="#555">WASM / Gesture Data</text>

  <!-- 1.0 ↔ D3 Progress (track login) -->
  <path d="M332,104 C332,150 530,250 580,335" fill="none" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="486" y="228" text-anchor="middle" fill="#999">Update Session</text>

</svg>
