<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#444"/>
    </marker>
  </defs>
  <rect width="980" height="540" fill="white"/>
  <text x="490" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">KidoLearn — Data Flow Diagram (Level 1)</text>

  <!-- ── EXTERNAL ENTITY: Child User ── -->
  <rect x="20" y="230" width="100" height="50" fill="#d0e8fb" stroke="#0DA2E7" stroke-width="2"/>
  <text x="70" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Child</text>
  <text x="70" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">User</text>

  <!-- ── PROCESS 1: Authentication ── -->
  <ellipse cx="230" cy="115" rx="85" ry="38" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">1.0</text>
  <text x="230" y="126" text-anchor="middle" font-size="10" fill="#333">Authentication</text>

  <!-- ── PROCESS 2: Lesson Delivery ── -->
  <ellipse cx="230" cy="255" rx="85" ry="38" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="230" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">2.0</text>
  <text x="230" y="266" text-anchor="middle" font-size="10" fill="#333">Lesson Delivery</text>

  <!-- ── PROCESS 3: Quiz Processing ── -->
  <ellipse cx="230" cy="395" rx="85" ry="38" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="230" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">3.0</text>
  <text x="230" y="406" text-anchor="middle" font-size="10" fill="#333">Quiz Processing</text>

  <!-- ── PROCESS 4: Gesture Game Engine ── -->
  <ellipse cx="560" cy="255" rx="85" ry="38" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="560" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">4.0</text>
  <text x="560" y="266" text-anchor="middle" font-size="10" fill="#333">Gesture Game Engine</text>

  <!-- ── PROCESS 5: Progress Tracking ── -->
  <ellipse cx="560" cy="115" rx="85" ry="38" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="560" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">5.0</text>
  <text x="560" y="126" text-anchor="middle" font-size="10" fill="#333">Progress Tracking</text>

  <!-- ── DATA STORES ── -->
  <!-- D1: Users DB -->
  <line x1="750" y1="95" x2="750" y2="135" stroke="#555" stroke-width="1.5"/>
  <line x1="750" y1="95" x2="920" y2="95" stroke="#555" stroke-width="1.5"/>
  <line x1="920" y1="95" x2="920" y2="135" stroke="#555" stroke-width="1.5"/>
  <line x1="750" y1="135" x2="920" y2="135" stroke="#555" stroke-width="1.5"/>
  <line x1="780" y1="95" x2="780" y2="135" stroke="#555" stroke-width="1.5"/>
  <text x="770" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">D1</text>
  <text x="852" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Users Database</text>
  <text x="852" y="128" text-anchor="middle" font-size="10" fill="#555">Profiles · Credentials · Sessions</text>

  <!-- D2: Course/Lesson DB -->
  <line x1="750" y1="235" x2="750" y2="275" stroke="#555" stroke-width="1.5"/>
  <line x1="750" y1="235" x2="920" y2="235" stroke="#555" stroke-width="1.5"/>
  <line x1="920" y1="235" x2="920" y2="275" stroke="#555" stroke-width="1.5"/>
  <line x1="750" y1="275" x2="920" y2="275" stroke="#555" stroke-width="1.5"/>
  <line x1="780" y1="235" x2="780" y2="275" stroke="#555" stroke-width="1.5"/>
  <text x="770" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">D2</text>
  <text x="852" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Course &amp; Lesson Database</text>
  <text x="852" y="268" text-anchor="middle" font-size="10" fill="#555">6 Courses · 60 Lessons · Quiz Data</text>

  <!-- D3: Progress DB -->
  <line x1="750" y1="375" x2="750" y2="415" stroke="#555" stroke-width="1.5"/>
  <line x1="750" y1="375" x2="920" y2="375" stroke="#555" stroke-width="1.5"/>
  <line x1="920" y1="375" x2="920" y2="415" stroke="#555" stroke-width="1.5"/>
  <line x1="750" y1="415" x2="920" y2="415" stroke="#555" stroke-width="1.5"/>
  <line x1="780" y1="375" x2="780" y2="415" stroke="#555" stroke-width="1.5"/>
  <text x="770" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">D3</text>
  <text x="852" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Progress Database</text>
  <text x="852" y="408" text-anchor="middle" font-size="10" fill="#555">Completion · Scores · User Stats</text>

  <!-- ── MediaPipe (external) ── -->
  <rect x="400" y="420" width="110" height="50" fill="#d0e8fb" stroke="#0DA2E7" stroke-width="2"/>
  <text x="455" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">MediaPipe</text>
  <text x="455" y="456" text-anchor="middle" font-size="10" fill="#555">WASM / CDN</text>

  <!-- ── ARROWS ── -->
  <!-- User → Auth -->
  <line x1="120" y1="240" x2="145" y2="145" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="118" y="196" font-size="9" fill="#555">Login /</text>
  <text x="115" y="207" font-size="9" fill="#555">Register</text>

  <!-- User → Lesson Delivery -->
  <line x1="120" y1="255" x2="145" y2="255" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="127" y="248" font-size="9" fill="#555">Select Course</text>

  <!-- User → Quiz -->
  <line x1="120" y1="265" x2="145" y2="375" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="104" y="330" font-size="9" fill="#555">Answers</text>

  <!-- Auth → Users DB -->
  <line x1="315" y1="115" x2="750" y2="115" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="108" text-anchor="middle" font-size="9" fill="#555">Verify / Store User</text>

  <!-- Users DB → Auth -->
  <line x1="750" y1="125" x2="315" y2="125" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="136" text-anchor="middle" font-size="9" fill="#555">JWT Token / User Data</text>

  <!-- Auth → Progress -->
  <line x1="315" y1="105" x2="475" y2="105" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="395" y="98" text-anchor="middle" font-size="9" fill="#555">Auth Confirm</text>

  <!-- Lesson Delivery → Course DB -->
  <line x1="315" y1="255" x2="750" y2="255" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="248" text-anchor="middle" font-size="9" fill="#555">Query Lessons</text>

  <!-- Course DB → Lesson Delivery -->
  <line x1="750" y1="265" x2="315" y2="265" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="277" text-anchor="middle" font-size="9" fill="#555">Lesson Content / Quiz Data</text>

  <!-- Quiz → Progress DB -->
  <line x1="315" y1="395" x2="750" y2="395" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="388" text-anchor="middle" font-size="9" fill="#555">Save Score / Completion</text>

  <!-- Progress DB → User (score) -->
  <line x1="750" y1="405" x2="315" y2="405" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="418" text-anchor="middle" font-size="9" fill="#555">Quiz Result / Score</text>

  <!-- Gesture Game → MediaPipe -->
  <line x1="510" y1="285" x2="490" y2="420" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="470" y="355" font-size="9" fill="#555">Camera Feed</text>

  <!-- MediaPipe → Gesture Game -->
  <line x1="510" y1="430" x2="535" y2="293" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="545" y="365" font-size="9" fill="#555">Gesture Data</text>

  <!-- Progress → Progress DB -->
  <line x1="645" y1="115" x2="750" y2="395" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="730" y="260" font-size="9" fill="#555">Update</text>

  <!-- Lesson ↔ Quiz (internal) -->
  <line x1="230" y1="293" x2="230" y2="357" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="238" y="328" font-size="9" fill="#555">Quiz Request</text>

  <!-- User → Gesture Game -->
  <line x1="120" y1="260" x2="475" y2="255" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="310" y="242" text-anchor="middle" font-size="9" fill="#555">Open Game</text>

</svg>
