<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <rect width="960" height="430" fill="white"/>

  <!-- ── STICK FIGURE (Child User) ── -->
  <circle cx="44" cy="58" r="14" fill="none" stroke="#333" stroke-width="1.8"/>
  <line x1="44" y1="72" x2="44" y2="114" stroke="#333" stroke-width="1.8"/>
  <line x1="44" y1="86" x2="24" y2="102" stroke="#333" stroke-width="1.8"/>
  <line x1="44" y1="86" x2="64" y2="102" stroke="#333" stroke-width="1.8"/>
  <line x1="44" y1="114" x2="28" y2="138" stroke="#333" stroke-width="1.8"/>
  <line x1="44" y1="114" x2="60" y2="138" stroke="#333" stroke-width="1.8"/>
  <text x="44" y="155" text-anchor="middle" font-size="12" fill="#333">Child User</text>

  <!-- Arrow: User → Client -->
  <line x1="68" y1="96" x2="88" y2="96" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ CLIENT BOX ══ -->
  <rect x="90" y="38" width="175" height="165" rx="3" fill="#f7f7f7" stroke="#444" stroke-width="2"/>
  <polyline points="265,38 275,28 275,193 265,183" fill="#e0e0e0" stroke="#444" stroke-width="1.5"/>
  <polyline points="90,38 100,28 275,28 265,38" fill="#eaeaea" stroke="#444" stroke-width="1.5"/>
  <text x="177" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Client</text>

  <!-- Browser UI component -->
  <rect x="108" y="63" width="138" height="46" rx="2" fill="white" stroke="#888" stroke-width="1.3"/>
  <rect x="237" y="70" width="13" height="9" rx="1" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="235" y="72" width="7" height="5" fill="none" stroke="#888" stroke-width="1"/>
  <text x="172" y="81" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Browser UI</text>
  <text x="172" y="97" text-anchor="middle" font-size="10" fill="#666">React + Vite</text>

  <!-- MediaPipe component -->
  <rect x="108" y="118" width="138" height="46" rx="2" fill="white" stroke="#888" stroke-width="1.3"/>
  <rect x="237" y="125" width="13" height="9" rx="1" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="235" y="127" width="7" height="5" fill="none" stroke="#888" stroke-width="1"/>
  <text x="172" y="136" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">MediaPipe</text>
  <text x="172" y="152" text-anchor="middle" font-size="10" fill="#666">Hand Tracking (WASM)</text>

  <!-- Arrow: Client → Server (Express) -->
  <line x1="275" y1="126" x2="298" y2="126" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ SERVER BOX ══ -->
  <rect x="300" y="18" width="490" height="380" rx="3" fill="#f0f0f0" stroke="#444" stroke-width="2"/>
  <polyline points="790,18 800,8 800,388 790,378" fill="#ddd" stroke="#444" stroke-width="1.5"/>
  <polyline points="300,18 310,8 800,8 790,18" fill="#e6e6e6" stroke="#444" stroke-width="1.5"/>
  <text x="545" y="38" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Server</text>

  <!-- Express API box -->
  <rect x="318" y="50" width="148" height="52" rx="2" fill="white" stroke="#888" stroke-width="1.3"/>
  <rect x="457" y="57" width="13" height="9" rx="1" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="455" y="59" width="7" height="5" fill="none" stroke="#888" stroke-width="1"/>
  <text x="392" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Express API Server</text>
  <text x="392" y="88" text-anchor="middle" font-size="10" fill="#666">Node.js · REST Routes</text>

  <!-- Arrow: Express → Auth -->
  <line x1="466" y1="68" x2="500" y2="68" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: Express → Lesson Engine (elbow) -->
  <polyline points="466,82 484,82 484,190 500,190" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: Express → Flask (down) -->
  <line x1="392" y1="102" x2="392" y2="288" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AUTH box -->
  <rect x="500" y="46" width="160" height="64" rx="2" fill="white" stroke="#888" stroke-width="1.3"/>
  <rect x="651" y="53" width="13" height="9" rx="1" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="649" y="55" width="7" height="5" fill="none" stroke="#888" stroke-width="1"/>
  <text x="580" y="65" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Auth Module</text>
  <text x="580" y="81" text-anchor="middle" font-size="10" fill="#666">JWT Authentication</text>
  <text x="580" y="96" text-anchor="middle" font-size="10" fill="#666">Face Login · Password Validation</text>

  <!-- LESSON ENGINE box -->
  <rect x="500" y="162" width="160" height="88" rx="2" fill="white" stroke="#888" stroke-width="1.3"/>
  <rect x="651" y="169" width="13" height="9" rx="1" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="649" y="171" width="7" height="5" fill="none" stroke="#888" stroke-width="1"/>
  <text x="580" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Core Services</text>
  <text x="580" y="198" text-anchor="middle" font-size="10" fill="#666">Lesson Engine (60 Lessons)</text>
  <text x="580" y="213" text-anchor="middle" font-size="10" fill="#666">AI Quiz Generator</text>
  <text x="580" y="228" text-anchor="middle" font-size="10" fill="#666">Progress Tracker</text>

  <!-- FLASK SERVICE box -->
  <rect x="318" y="290" width="148" height="64" rx="2" fill="white" stroke="#888" stroke-width="1.3"/>
  <rect x="457" y="297" width="13" height="9" rx="1" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="455" y="299" width="7" height="5" fill="none" stroke="#888" stroke-width="1"/>
  <text x="392" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Flask Service</text>
  <text x="392" y="326" text-anchor="middle" font-size="10" fill="#666">Python · Hand Detection</text>
  <text x="392" y="341" text-anchor="middle" font-size="10" fill="#666">MediaPipe Server-Side</text>

  <!-- Arrow: Auth → PostgreSQL DB -->
  <line x1="660" y1="72" x2="808" y2="118" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: Lesson Engine → PostgreSQL DB -->
  <line x1="660" y1="196" x2="808" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: Flask → MediaPipe CDN -->
  <line x1="466" y1="318" x2="808" y2="318" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ PostgreSQL DB (cylinder) ══ -->
  <ellipse cx="855" cy="130" rx="48" ry="14" fill="#f5f5f5" stroke="#555" stroke-width="1.5"/>
  <rect x="807" y="130" width="96" height="58" fill="#f5f5f5" stroke="none"/>
  <line x1="807" y1="130" x2="807" y2="188" stroke="#555" stroke-width="1.5"/>
  <line x1="903" y1="130" x2="903" y2="188" stroke="#555" stroke-width="1.5"/>
  <ellipse cx="855" cy="188" rx="48" ry="14" fill="#f5f5f5" stroke="#555" stroke-width="1.5"/>
  <text x="855" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">PostgreSQL</text>
  <text x="855" y="172" text-anchor="middle" font-size="10" fill="#666">Database</text>

  <!-- ══ MediaPipe CDN (document / page shape) ══ -->
  <rect x="808" y="290" width="94" height="58" rx="2" fill="#f5f5f5" stroke="#555" stroke-width="1.5"/>
  <polygon points="878,290 902,290 902,312 878,312" fill="#e0e0e0" stroke="#555" stroke-width="1.2"/>
  <line x1="878" y1="290" x2="902" y2="312" stroke="#555" stroke-width="1.2"/>
  <text x="851" y="316" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">MediaPipe</text>
  <text x="851" y="332" text-anchor="middle" font-size="10" fill="#666">CDN / WASM</text>

</svg>
