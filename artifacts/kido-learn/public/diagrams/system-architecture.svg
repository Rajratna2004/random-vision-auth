<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
  </defs>

  <rect width="1100" height="500" fill="white"/>

  <!-- ─────────────────────────── TIER LABELS ─────────────────────────── -->
  <text x="10" y="168" font-size="11" fill="#888" font-style="italic" transform="rotate(-90,10,168)">Presentation Layer</text>
  <text x="10" y="340" font-size="11" fill="#888" font-style="italic" transform="rotate(-90,10,340)">Application Layer</text>
  <text x="10" y="468" font-size="11" fill="#888" font-style="italic" transform="rotate(-90,10,468)">Data Layer</text>

  <!-- Divider lines -->
  <line x1="28" y1="258" x2="1090" y2="258" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="28" y1="378" x2="1090" y2="378" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ─────────────────────────── STICK FIGURE ─────────────────────────── -->
  <circle cx="62" cy="52" r="15" fill="none" stroke="#333" stroke-width="1.8"/>
  <line x1="62" y1="67" x2="62" y2="112" stroke="#333" stroke-width="1.8"/>
  <line x1="62" y1="82" x2="42" y2="99" stroke="#333" stroke-width="1.8"/>
  <line x1="62" y1="82" x2="82" y2="99" stroke="#333" stroke-width="1.8"/>
  <line x1="62" y1="112" x2="46" y2="136" stroke="#333" stroke-width="1.8"/>
  <line x1="62" y1="112" x2="78" y2="136" stroke="#333" stroke-width="1.8"/>
  <text x="62" y="152" text-anchor="middle" font-size="11" fill="#333">Child User</text>

  <!-- Arrow: User → Presentation -->
  <line x1="85" y1="90" x2="108" y2="90" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════ PRESENTATION LAYER ═══════════════ -->
  <rect x="110" y="20" width="800" height="230" rx="4" fill="#EAF6FD" stroke="#0DA2E7" stroke-width="2"/>
  <text x="510" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a7ab0">Presentation Layer — Client (Browser)</text>

  <!-- Browser UI box -->
  <rect x="135" y="55" width="185" height="80" rx="3" fill="white" stroke="#0DA2E7" stroke-width="1.5"/>
  <rect x="296" y="62" width="14" height="10" rx="1" fill="white" stroke="#0DA2E7" stroke-width="1"/>
  <rect x="294" y="64" width="8" height="6" fill="none" stroke="#0DA2E7" stroke-width="1"/>
  <text x="222" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Browser UI</text>
  <text x="222" y="96" text-anchor="middle" font-size="10" fill="#555">React + Vite</text>
  <text x="222" y="111" text-anchor="middle" font-size="10" fill="#555">Tailwind CSS · React Query</text>

  <!-- Dashboard box -->
  <rect x="345" y="55" width="155" height="80" rx="3" fill="white" stroke="#0DA2E7" stroke-width="1.5"/>
  <rect x="486" y="62" width="14" height="10" rx="1" fill="white" stroke="#0DA2E7" stroke-width="1"/>
  <text x="422" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Dashboard</text>
  <text x="422" y="96" text-anchor="middle" font-size="10" fill="#555">Courses · Progress</text>
  <text x="422" y="111" text-anchor="middle" font-size="10" fill="#555">User Profile</text>

  <!-- Lesson + Quiz box -->
  <rect x="525" y="55" width="155" height="80" rx="3" fill="white" stroke="#0DA2E7" stroke-width="1.5"/>
  <rect x="666" y="62" width="14" height="10" rx="1" fill="white" stroke="#0DA2E7" stroke-width="1"/>
  <text x="602" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Lesson Viewer</text>
  <text x="602" y="96" text-anchor="middle" font-size="10" fill="#555">60 Lessons · Animated</text>
  <text x="602" y="111" text-anchor="middle" font-size="10" fill="#555">AI Quiz Engine</text>

  <!-- Gesture Games box -->
  <rect x="705" y="55" width="185" height="80" rx="3" fill="white" stroke="#0DA2E7" stroke-width="1.5"/>
  <rect x="866" y="62" width="14" height="10" rx="1" fill="white" stroke="#0DA2E7" stroke-width="1"/>
  <text x="792" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Gesture Games</text>
  <text x="792" y="96" text-anchor="middle" font-size="10" fill="#555">Air Draw · Hand Painter</text>
  <text x="792" y="111" text-anchor="middle" font-size="10" fill="#555">Air Piano · MediaPipe WASM</text>

  <!-- MediaPipe note -->
  <rect x="705" y="152" width="185" height="80" rx="3" fill="#FFF8E1" stroke="#f0ad00" stroke-width="1.5"/>
  <text x="792" y="174" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5900">MediaPipe HandLandmarker</text>
  <text x="792" y="192" text-anchor="middle" font-size="10" fill="#7a5900">WebAssembly (Client-Side)</text>
  <text x="792" y="207" text-anchor="middle" font-size="10" fill="#7a5900">Real-time Gesture Detection</text>
  <text x="792" y="222" text-anchor="middle" font-size="10" fill="#7a5900">No server round-trip</text>

  <!-- Arrow: Gesture Games → MediaPipe -->
  <line x1="792" y1="135" x2="792" y2="150" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── REST API arrows (Presentation → Application) ─── -->
  <line x1="222" y1="135" x2="222" y2="288" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="422" y1="135" x2="422" y2="288" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="602" y1="135" x2="602" y2="288" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="380" y="272" text-anchor="middle" font-size="10" fill="#666" font-style="italic">REST API (JWT)</text>

  <!-- ═══════════════ APPLICATION LAYER ═══════════════ -->
  <rect x="110" y="265" width="800" height="105" rx="4" fill="#F0F9F0" stroke="#4caf50" stroke-width="2"/>
  <text x="510" y="283" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Application Layer — Node.js Express Server</text>

  <!-- Auth Module -->
  <rect x="130" y="292" width="148" height="64" rx="3" fill="white" stroke="#4caf50" stroke-width="1.3"/>
  <text x="204" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Auth Module</text>
  <text x="204" y="329" text-anchor="middle" font-size="10" fill="#555">JWT · Face Login</text>
  <text x="204" y="344" text-anchor="middle" font-size="10" fill="#555">Password Validation</text>

  <!-- Lesson Engine -->
  <rect x="298" y="292" width="148" height="64" rx="3" fill="white" stroke="#4caf50" stroke-width="1.3"/>
  <text x="372" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Lesson Engine</text>
  <text x="372" y="329" text-anchor="middle" font-size="10" fill="#555">6 Courses · 60 Lessons</text>
  <text x="372" y="344" text-anchor="middle" font-size="10" fill="#555">REST Routes</text>

  <!-- Quiz Engine -->
  <rect x="466" y="292" width="148" height="64" rx="3" fill="white" stroke="#4caf50" stroke-width="1.3"/>
  <text x="540" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Quiz Engine</text>
  <text x="540" y="329" text-anchor="middle" font-size="10" fill="#555">Static AI Generator</text>
  <text x="540" y="344" text-anchor="middle" font-size="10" fill="#555">Score Evaluation</text>

  <!-- Progress Tracker -->
  <rect x="634" y="292" width="148" height="64" rx="3" fill="white" stroke="#4caf50" stroke-width="1.3"/>
  <text x="708" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Progress Tracker</text>
  <text x="708" y="329" text-anchor="middle" font-size="10" fill="#555">Completion Records</text>
  <text x="708" y="344" text-anchor="middle" font-size="10" fill="#555">User Stats</text>

  <!-- Flask Microservice -->
  <rect x="798" y="292" width="100" height="64" rx="3" fill="white" stroke="#4caf50" stroke-width="1.3"/>
  <text x="848" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Flask</text>
  <text x="848" y="329" text-anchor="middle" font-size="10" fill="#555">Python Service</text>
  <text x="848" y="344" text-anchor="middle" font-size="10" fill="#555">Hand Detection</text>

  <!-- ─── DB arrows (Application → Data) ─── -->
  <line x1="204" y1="356" x2="204" y2="395" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="372" y1="356" x2="372" y2="395" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="356" x2="540" y2="395" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="708" y1="356" x2="708" y2="395" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════ DATA LAYER ═══════════════ -->
  <rect x="110" y="385" width="800" height="100" rx="4" fill="#FDF0F0" stroke="#e57373" stroke-width="2"/>
  <text x="510" y="403" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Data Layer — PostgreSQL Database</text>

  <!-- Users table -->
  <rect x="130" y="413" width="148" height="55" rx="3" fill="white" stroke="#e57373" stroke-width="1.3"/>
  <text x="204" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Users Table</text>
  <text x="204" y="449" text-anchor="middle" font-size="10" fill="#555">Profiles · Sessions</text>
  <text x="204" y="462" text-anchor="middle" font-size="10" fill="#555">Credentials</text>

  <!-- Courses table -->
  <rect x="298" y="413" width="148" height="55" rx="3" fill="white" stroke="#e57373" stroke-width="1.3"/>
  <text x="372" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Courses Table</text>
  <text x="372" y="449" text-anchor="middle" font-size="10" fill="#555">6 Subjects</text>
  <text x="372" y="462" text-anchor="middle" font-size="10" fill="#555">60 Lessons</text>

  <!-- Quiz table -->
  <rect x="466" y="413" width="148" height="55" rx="3" fill="white" stroke="#e57373" stroke-width="1.3"/>
  <text x="540" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Quiz Records</text>
  <text x="540" y="449" text-anchor="middle" font-size="10" fill="#555">Questions · Answers</text>
  <text x="540" y="462" text-anchor="middle" font-size="10" fill="#555">Scores</text>

  <!-- Progress table -->
  <rect x="634" y="413" width="260" height="55" rx="3" fill="white" stroke="#e57373" stroke-width="1.3"/>
  <text x="764" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Progress Table</text>
  <text x="764" y="449" text-anchor="middle" font-size="10" fill="#555">Lesson Completion · Course Progress</text>
  <text x="764" y="462" text-anchor="middle" font-size="10" fill="#555">User Statistics</text>

  <!-- Legend -->
  <rect x="936" y="20" width="150" height="115" rx="3" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="1011" y="38" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <line x1="950" y1="52" x2="980" y2="52" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="1030" y="56" font-size="10" fill="#555">Data Flow</text>
  <line x1="950" y1="72" x2="980" y2="72" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="1030" y="76" font-size="10" fill="#555">REST API Call</text>
  <rect x="950" y="88" width="14" height="10" rx="1" fill="#EAF6FD" stroke="#0DA2E7" stroke-width="1.2"/>
  <text x="1030" y="97" font-size="10" fill="#555">Client Layer</text>
  <rect x="950" y="106" width="14" height="10" rx="1" fill="#F0F9F0" stroke="#4caf50" stroke-width="1.2"/>
  <text x="1030" y="115" font-size="10" fill="#555">Server Layer</text>
  <rect x="950" y="124" width="14" height="10" rx="1" fill="#FDF0F0" stroke="#e57373" stroke-width="1.2"/>
  <text x="1030" y="133" font-size="10" fill="#555">Data Layer</text>

</svg>
